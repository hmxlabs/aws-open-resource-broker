name: Reusable Security Workflow

on:
  workflow_call:
    inputs:
      scan-type:
        description: 'Type of security scan (bandit, safety, semgrep, trivy-fs, hadolint, codeql)'
        required: true
        type: string
      python-version:
        description: 'Python version for scans that need it'
        required: false
        type: string
      default-python-version:
        description: 'Default Python version (fallback)'
        required: true
        type: string

jobs:
  security-scan:
    name: ${{ inputs.scan-type }} Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: ${{ inputs.scan-type == 'codeql' && 0 || 1 }}

      - name: Setup Python and UV
        if: contains('bandit,safety,codeql', inputs.scan-type)
        uses: ./.github/actions/setup-uv-cached
        with:
          cache-key: deps-${{ inputs.python-version || inputs.default-python-version }}-${{ hashFiles('.project.yml', 'pyproject.toml', 'requirements*.txt') }}
          fail-on-cache-miss: false

      # Bandit Security Scan
      - name: Run Bandit security scan
        if: inputs.scan-type == 'bandit'
        run: make ci-security-bandit

      # Safety Dependency Scan
      - name: Run Safety dependency scan
        if: inputs.scan-type == 'safety'
        run: make ci-security-safety

      # Semgrep Static Analysis
      - name: Install Semgrep
        if: inputs.scan-type == 'semgrep'
        run: pip install semgrep==1.127.0

      # || true on the semgrep command below is INTENTIONAL: semgrep is advisory-only
      # for now.  --error requests a non-zero exit on findings, but || true absorbs it
      # so CI is never blocked.  Findings are still captured in semgrep.sarif and
      # surfaced in the GitHub Security tab via the upload-sarif step that follows.
      # TODO: remove || true once the finding backlog is triaged and semgrep is
      # promoted to a hard gate.
      - name: Run Semgrep security analysis
        if: inputs.scan-type == 'semgrep'
        run: |
          semgrep scan \
            --config p/security-audit \
            --config p/secrets \
            --config p/python \
            --sarif \
            --output semgrep.sarif \
            --error \
            . || true

      - name: Upload Semgrep SARIF results
        if: inputs.scan-type == 'semgrep' && always()
        uses: github/codeql-action/upload-sarif@dc73d59c2d7bd4f8194098a91219eeee6d8a1719  # v4
        with:
          sarif_file: semgrep.sarif

      # Trivy Filesystem Scan
      # Trivy is configured to emit SARIF only (no severity-threshold / exit-code
      # inputs set), so it never fails the step regardless of findings.  This is
      # INTENTIONAL: results are surfaced in the GitHub Security tab via the
      # upload-sarif step below, but do not block CI.
      # TODO: add severity: CRITICAL (or HIGH,CRITICAL) once the finding backlog
      # has been triaged and Trivy is ready to act as a hard gate.
      - name: Run Trivy filesystem vulnerability scanner
        if: inputs.scan-type == 'trivy-fs'
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-fs-results.sarif'

      - name: Upload Trivy filesystem scan results
        if: inputs.scan-type == 'trivy-fs' && always()
        uses: github/codeql-action/upload-sarif@dc73d59c2d7bd4f8194098a91219eeee6d8a1719  # v4
        with:
          sarif_file: 'trivy-fs-results.sarif'

      # Hadolint Dockerfile Scan
      # no-fail: true is INTENTIONAL: hadolint is advisory-only for now.  Findings
      # are written to hadolint-results.sarif and uploaded to the GitHub Security tab
      # via the upload-sarif step below, but a non-zero hadolint exit code does not
      # block CI.
      # TODO: remove no-fail: true once Dockerfile best-practice rules have been
      # reviewed and hadolint is ready to act as a hard gate.
      - name: Run Hadolint Dockerfile scan
        if: inputs.scan-type == 'hadolint'
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5  # v3.3.0
        with:
          dockerfile: Dockerfile
          format: sarif
          output-file: hadolint-results.sarif
          no-fail: true

      - name: Upload Hadolint SARIF results
        if: inputs.scan-type == 'hadolint' && always()
        uses: github/codeql-action/upload-sarif@dc73d59c2d7bd4f8194098a91219eeee6d8a1719  # v4
        with:
          sarif_file: hadolint-results.sarif

      # CodeQL Analysis
      #
      # continue-on-error: true on the init step is INTENTIONAL: the primary init
      # requests the broader security-extended query pack which may not be available
      # in all runner environments.  If it fails, the fallback init step re-runs with
      # the narrower security-and-quality pack.  The analyze step runs unconditionally
      # (conditioned only on scan-type == 'codeql') so that results are always
      # uploaded regardless of which init path succeeded.  This ensures CodeQL
      # findings always reach the GitHub Security tab even when the extended pack is
      # unavailable.
      #
      # KNOWN COVERAGE GAPS (flagged for a future task):
      # - CodeQL only runs on a schedule or when a commit message contains "[security]".
      #   Regular PR pushes do NOT trigger CodeQL, so new code can land without a scan.
      #   TODO: evaluate adding CodeQL to the standard PR gate (cost vs. latency trade-off).
      # - TruffleHog (secret scanning) skips scheduled runs; it only runs on push/PR.
      #   TODO: verify scheduled secret-scanning coverage or add a separate nightly job.
      # - dependency-review only runs on pull_request events (PR-only by design in the
      #   GitHub action), so direct pushes to main bypass it.
      #   TODO: ensure branch protection prevents direct pushes to main.
      - name: Initialize CodeQL
        if: inputs.scan-type == 'codeql'
        uses: github/codeql-action/init@dc73d59c2d7bd4f8194098a91219eeee6d8a1719  # v4
        with:
          languages: python
          queries: security-extended,security-and-quality
        continue-on-error: true
        id: codeql-init-extended

      - name: Initialize CodeQL (fallback)
        if: inputs.scan-type == 'codeql' && steps.codeql-init-extended.outcome == 'failure'
        uses: github/codeql-action/init@dc73d59c2d7bd4f8194098a91219eeee6d8a1719  # v4
        with:
          languages: python
          queries: security-and-quality

      - name: Perform CodeQL Analysis
        if: inputs.scan-type == 'codeql'
        uses: github/codeql-action/analyze@dc73d59c2d7bd4f8194098a91219eeee6d8a1719  # v4
        with:
          category: "/language:python"
