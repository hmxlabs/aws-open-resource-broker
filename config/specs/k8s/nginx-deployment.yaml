apiVersion: apps/v1
kind: Deployment
metadata:
  name: "{{ resource_name }}"
  namespace: "{{ namespace }}"
  labels:
    app: nginx
    orb-request-id: "{{ request_id }}"
spec:
  replicas: {{ replicas }}
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
        orb-request-id: "{{ request_id }}"
    spec:
      containers:
      - name: nginx
        image: "{{ image }}"
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"
